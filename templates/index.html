{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Inventario de Productos</h1>
    <a href="/registrar" class="btn btn-primary">Añadir Producto</a>
</div>

<table class="table table-hover bg-white shadow-sm">

    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Categoría</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>
        {% for item in productos %}
        <tr>
            <td>{{item.id}}</td>
            <td>{{item.nombre}}</td>
            <td>{{item.categoria}}</td>
            <td>${{item.precio}}</td>
            <td>{{item.stock}}</td>
            <td>
                <a href="/editar/{{item.id}}" class="btn btn-sm btn-warning">Editar</a>
                <a href="/eliminar/{{item.id}}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar producto?')">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>

</table>

{% endblock %}
